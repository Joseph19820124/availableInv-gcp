# Cloud Build:构建镜像 → 推 Artifact Registry → 创建 Cloud Deploy 发布(由其滚动到 Cloud Run)
steps:
  # 1) 构建
  - name: gcr.io/cloud-builders/docker
    args: ['build', '-t', '${_IMAGE}:$SHORT_SHA', '-t', '${_IMAGE}:latest', '.']

  # 2) 推送
  - name: gcr.io/cloud-builders/docker
    args: ['push', '--all-tags', '${_IMAGE}']

  # 3) 创建 Cloud Deploy 发布(等价 CodePipeline 的 Deploy 阶段)
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - deploy
      - releases
      - create
      - rel-$SHORT_SHA
      - --delivery-pipeline=${_PIPELINE}
      - --region=${_REGION}
      - --images=availableinv=${_IMAGE}:$SHORT_SHA

substitutions:
  _REGION: us-central1
  _IMAGE: us-central1-docker.pkg.dev/gwsjoseph0326/availableinv/availableinv
  _PIPELINE: availableinv-pipeline

images:
  - '${_IMAGE}:$SHORT_SHA'
  - '${_IMAGE}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
