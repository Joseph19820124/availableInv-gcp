apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: availableinv
  labels:
    app: availableinv
spec:
  template:
    spec:
      serviceAccountName: availableinv-run@gwsjoseph0326.iam.gserviceaccount.com
      containerConcurrency: 80
      containers:
        # 镜像名 "availableinv" 是占位符,Cloud Deploy 发布时用 --images 替换为真实镜像
        - image: availableinv
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
  traffic:
    - percent: 100
      latestRevision: true
